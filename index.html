<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="theme-color" content="#A6CE39" />
    <meta name="background-color" content="#101820" />
    <meta name="description" content="MotoCare te ayuda a cuidar tu moto, registrar cada momento, descubrir rutas y disfrutar cada kilometro con tranquilidad." />
    <meta name="author" content="MotoCare" />
    <meta name="keywords" content="motos, moteros, mantenimiento, rutas, colombia, marketplace, gps, comunidad, MotoCare" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png" />
    
    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MotoCare" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#A6CE39" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-72x72.png" />
    
    <title>MotoCare - Tu moto. Tu historia. Tu ruta.</title>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registrado:', registration.scope);
            })
            .catch((error) => {
              console.log('SW error:', error);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
